name: Deploy boldi

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DB_HOST }}
          username: ${{ secrets.DB_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Creating project folder if it doesn't exist"
            mkdir -p /home/ubuntu/loyiha
            cd /home/ubuntu/loyiha

            if [ ! -d .git ]; then
              echo "Cloning repository"
             git clone https://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@github.com/Asqaraliyev-Faxriddin/Learning-Management-System.git .

            else
              echo "Pulling latest"
              git pull origin main 
            fi 

            echo "Stopping containers"
            docker compose down

            echo "Building containers"
            docker compose build

            echo "Starting containers"
            docker compose up -d
